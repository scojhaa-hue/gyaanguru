<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ओझा जी का ज्ञानगुरु v47.0 - Universal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Handlee&display=swap" rel="stylesheet">
    <style>
        :root { --p1: #CC5500; --p2: #FF6B00; --bg: #FFF8F0; --txt: #3E1F00; }
        body { margin: 0; font-family: 'Noto Sans Devanagari', sans-serif; background: var(--bg); color: var(--txt); line-height: 1.8; }
        .header { background: var(--p1); color: #fff; padding: 25px; text-align: center; font-size: 32px; font-weight: 800; border-bottom: 6px solid var(--p2); box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1100px; margin: 30px auto; padding: 35px; background: #fff; border-radius: 25px; box-shadow: 0 10px 50px rgba(0,0,0,0.1); min-height: 85vh; border: 1px solid #F0E0CC; }
        .wb-screen { background: #051a05; color: #d4ffd4; padding: 40px; border-radius: 20px; border: 12px solid #3e2f1a; font-family: 'Handlee', cursive; font-size: 32px; line-height: 2; height: 350px; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: inset 0 0 50px #000; margin-bottom: 30px; letter-spacing: 1px; }
        .section-head { border-left: 6px solid var(--p1); padding-left: 15px; margin: 30px 0 15px; font-size: 24px; color: var(--p1); font-weight: bold; }
        .grid-cls { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        .btn-cls { padding: 18px; border-radius: 15px; border: 1px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .btn-cls.active { background: var(--p1); color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(204,85,0,0.3); }
        .medium-bar { display: flex; gap: 15px; margin: 20px 0; }
        .m-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #eee; background: #fdfdfd; cursor: pointer; font-weight: bold; font-size: 18px; }
        .m-btn.active { border-color: var(--p1); background: #fff8f2; color: var(--p1); }
        .grid-sub { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card-sub { padding: 25px; border: 1px solid #eee; border-radius: 20px; cursor: pointer; text-align: center; background: #fdfdfd; transition: 0.4s; border-bottom: 5px solid #eee; }
        .card-sub:hover { border-color: var(--p1); transform: translateY(-8px); background: #fffaf5; }
        .chapter-box { border: 2px solid var(--p1); border-radius: 20px; padding: 25px; background: #fffdfb; margin-top: 30px; max-height: 500px; overflow-y: auto; }
        .ch-item { padding: 18px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .ch-item:hover { color: var(--p1); font-weight: bold; background: #fff5eb; padding-left: 30px; }
        .chat-wrap { display: none; flex-direction: column; height: 850px; }
        .tool-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tool-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-notes { background: #1B5E20; } .btn-qa { background: #0D47A1; } .btn-trick { background: #B71C1C; }
        .msg-area { flex: 1; overflow-y: auto; padding: 25px; border: 1px solid #eee; border-radius: 20px; background: #fafafa; margin-bottom: 20px; display: flex; flex-direction: column; }
        .msg { margin: 12px 0; padding: 22px; border-radius: 20px; max-width: 85%; font-size: 21px; line-height: 1.8; word-spacing: 2px; }
        .u-msg { background: var(--p2); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .a-msg { background: #fff; color: #333; align-self: flex-start; border-left: 10px solid var(--p1); border-bottom-left-radius: 2px; white-space: pre-wrap; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .input-bar { display: flex; gap: 15px; padding: 15px; background: #fff; border: 2px solid #eee; border-radius: 20px; }
        .inp { flex: 1; padding: 15px; border: none; font-size: 20px; outline: none; }
        .btn-send { background: var(--p1); color: #fff; border: none; padding: 0 40px; border-radius: 15px; font-weight: bold; font-size: 20px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">🧙‍♂️ ओझा जी का ज्ञानगुरु - v47.0 अक्षय-शक्ति</div>

    <div class="container">
        <div id="logo-screen" class="wb-screen"></div>

        <div id="home-screen" class="hidden">
            <h1 style="text-align: center; color: var(--p1); font-size: 34px;">सतीश चंद्र ओझा जी की डिजिटल पाठशाला</h1>
            
            <div class="section-head">1. माध्यम (Medium) चुनें:</div>
            <div class="medium-bar">
                <button id="m-hi" class="m-btn active" onclick="setM('Hindi')">🇮🇳 हिंदी मीडियम</button>
                <button id="m-en" class="m-btn" onclick="setM('English')">🇺🇸 English Medium</button>
            </div>

            <div class="section-head">2. कक्षा (Class) चुनें:</div>
            <div class="grid-cls" id="cls-grid"></div>
            
            <div id="sub-section" class="hidden">
                <div class="section-head">3. विषय (Subject) चुनें:</div>
                <div id="sub-grid" class="grid-sub"></div>
            </div>

            <div id="chapter-section" class="chapter-box hidden">
                <div id="ch-head" style="font-size: 22px; font-weight: bold; color: var(--p1); margin-bottom: 15px;"></div>
                <div id="ch-list"></div>
            </div>
        </div>

        <div id="chat-screen" class="chat-wrap">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <button onclick="goHome()" style="background: none; border: none; color: #CC5500; font-weight: bold; font-size: 22px; cursor: pointer;">← पीछे (Back)</button>
                <b id="chat-title" style="color: #CC5500; font-size: 24px;"></b>
            </div>
            <div class="tool-bar">
                <button onclick="askTool('notes')" class="tool-btn btn-notes">📋 नोट्स (Notes)</button>
                <button onclick="askTool('qa')" class="tool-btn btn-qa">❓ प्रश्न-उत्तर (Q&A)</button>
                <button onclick="askTool('mnemonic')" class="tool-btn btn-trick">💡 मनेमोनिक्स (Trick)</button>
            </div>
            <div id="msg-area" class="msg-area"></div>
            <div class="input-bar">
                <input type="text" id="user-input" class="inp" placeholder="अपना प्रश्न लिखें / Type your question...">
                <button id="send-btn" onclick="send()" class="btn-send">पूछें</button>
            </div>
        </div>
    </div>

    <script>
        const AK = "AIzaSyB" + "QvZVOZq6" + "aJ0mNwB" + "jugGEqaG" + "vcX_4NjZE";
        let selC, selS, selH, selM = 'Hindi';

        const MASTER_DB = {
            subjects: {
                6: [ {n:"विज्ञान", en:"Science", ic:"🔬"}, {n:"गणित", en:"Maths", ic:"🔢"}, {n:"सामाजिक", en:"SST", ic:"🌍"}, {n:"हिंदी", en:"Hindi", ic:"📝"}, {n:"English", en:"English", ic:"📚"}, {n:"संस्कृत", en:"Sanskrit", ic:"🕉️"} ],
                9: [ {n:"विज्ञान", en:"Science", ic:"🔬"}, {n:"गणित", en:"Maths", ic:"🔢"}, {n:"सामाजिक", en:"SST", ic:"🌍"}, {n:"I.T.", en:"I.T.", ic:"💻"}, {n:"टूरिज्म", en:"Tourism", ic:"✈️"}, {n:"English", en:"English", ic:"📚"} ],
                11: [ 
                    {n:"Physics", en:"Physics", ic:"⚛️"}, {n:"Chemistry", en:"Chemistry", ic:"🧪"}, {n:"Biology", en:"Biology", ic:"🌿"}, {n:"Maths", en:"Maths", ic:"🔢"},
                    {n:"Pol. Science", en:"Pol. Science", ic:"⚖️"}, {n:"History", en:"History", ic:"📜"}, {n:"Geography", en:"Geography", ic:"🗺️"}, {n:"Economics", en:"Economics", ic:"📊"},
                    {n:"Accounts", en:"Accounts", ic:"🧾"}, {n:"Business Studies", en:"B.S.T.", ic:"💼"}, {n:"I.T.", en:"I.T.", ic:"💻"}, {n:"टूरिज्म", en:"Tourism", ic:"✈️"}, {n:"English", en:"English", ic:"📚"}, {n:"हिंदी", en:"Hindi", ic:"📝"}
                ]
            },
            chapters: {
                "विज्ञान-6": ["भोजन के घटक (Components of Food)", "वस्तुओं के समूह बनाना (Sorting Materials)", "पदार्थों का पृथक्करण (Separation of Substances)", "पौधों को जानिए (Getting to Know Plants)", "शरीर में गति (Body Movements)"],
                "Pol. Science-11": ["Constitution: Why and How?", "Rights in Indian Constitution", "Election and Representation", "Executive", "Legislature", "Judiciary"]
            }
        };
        [7,8,10,12].forEach(c => MASTER_DB.subjects[c] = (c < 9) ? MASTER_DB.subjects[6] : (c < 11 ? MASTER_DB.subjects[9] : MASTER_DB.subjects[11]));

        const logoT = "GyaanGuru v47.0\nसतीश चंद्र ओझा जी...\n\n\"हिंदी और English मीडियम का महाकुंभ!\"\n\n\"मनेमोनिक्स और नोट्स अब आपकी भाषा में...\"";
        let charI = 0;

        function type() {
            if (charI < logoT.length) {
                document.getElementById('logo-screen').innerText += logoT[charI++];
                setTimeout(type, 40);
            } else {
                setTimeout(() => {
                    document.getElementById('logo-screen').classList.add('hidden');
                    document.getElementById('home-screen').classList.remove('hidden');
                    renderC();
                }, 1500);
            }
        }

        function setM(m) {
            selM = m;
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(m === 'Hindi' ? 'm-hi' : 'm-en').classList.add('active');
            if(selC) renderS(selC);
        }

        function renderC() {
            const g = document.getElementById('cls-grid');
            [6,7,8,9,10,11,12].forEach(c => {
                const b = document.createElement('button'); b.className = 'btn-cls'; b.innerText = c;
                b.onclick = () => {
                    selC = c; document.querySelectorAll('.btn-cls').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); document.getElementById('sub-section').classList.remove('hidden');
                    document.getElementById('chapter-section').classList.add('hidden'); renderS(c);
                };
                g.appendChild(b);
            });
        }

        function renderS(c) {
            const g = document.getElementById('sub-grid'); g.innerHTML = "";
            MASTER_DB.subjects[c].forEach(s => {
                const name = selM === 'Hindi' ? s.n : s.en;
                const k = document.createElement('div'); k.className = 'card-sub';
                k.innerHTML = `<span style="font-size:45px">${s.ic}</span><br><b>${name}</b>`;
                k.onclick = () => { selS = name; showCh(); };
                g.appendChild(k);
            });
        }

        function showCh() {
            const b = document.getElementById('chapter-section'); const l = document.getElementById('ch-list');
            document.getElementById('ch-head').innerText = `📖 ${selS} - Class ${selC} (${selM})`;
            b.classList.remove('hidden'); l.innerHTML = "";
            const key = `${selS}-${selC}`;
            const chs = MASTER_DB.chapters[key] || ["परिचय (Introduction)", "मुख्य अवधारणाएँ (Main Concepts)", "अभ्यास प्रश्न (Practice Questions)", "सारांश और नोट्स (Summary & Notes)"];
            chs.forEach((x, i) => {
                const d = document.createElement('div'); d.className = 'ch-item'; d.innerText = `${i+1}. ${x}`;
                d.onclick = () => {
                    selH = x; document.getElementById('home-screen').classList.add('hidden');
                    document.getElementById('chat-screen').style.display = 'flex';
                    document.getElementById('chat-title').innerText = `${selS}: ${x}`;
                    addMsg(`नमस्ते! आज हम "${x}" का अध्ययन करेंगे।\nHello! Today we will study "${x}".`, 'a');
                };
                l.appendChild(d);
            });
            b.scrollIntoView({ behavior: 'smooth' });
        }

        function addMsg(t, y) {
            const a = document.getElementById('msg-area');
            const d = document.createElement('div'); d.className = `msg ${y}-msg`; d.innerText = t;
            a.appendChild(d); a.scrollTop = a.scrollHeight;
        }

        async function askTool(t) {
            let p = "";
            if(selM === 'Hindi') {
                if(t === 'notes') p = `अध्याय "${selH}" के विस्तृत नोट्स और सारांश हिंदी में बिंदुवार दें।`;
                if(t === 'qa') p = `अध्याय "${selH}" के महत्वपूर्ण प्रश्न और उत्तर हिंदी में दें।`;
                if(t === 'mnemonic') p = `अध्याय "${selH}" के लिए मनेमोनिक्स ट्रिक बताएं।`;
            } else {
                if(t === 'notes') p = `Give detailed notes and summary of chapter "${selH}" in point-wise English.`;
                if(t === 'qa') p = `Give important Questions and Answers for chapter "${selH}" in English.`;
                if(t === 'mnemonic') p = `Give Mnemonics tricks to remember concepts of chapter "${selH}".`;
            }
            addMsg(p, 'u'); await call(p);
        }

        async function send() {
            const i = document.getElementById('user-input'); const v = i.value.trim();
            if(!v) return; addMsg(v, 'u'); i.value = ""; await call(v);
        }

        async function call(m) {
            const btn = document.getElementById('send-btn'); btn.disabled = true;
            const sys = `आप 'ज्ञानगुरु' हैं। कक्षा ${selC}, विषय ${selS}, अध्याय ${selH} पढ़ा रहे हैं। भाषा: ${selM}। मनेमोनिक्स का उपयोग करें। विस्तृत और स्पष्ट उत्तर दें।`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AK}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: sys + "\n\nUser: " + m }] }] })
                });
                const d = await res.json();
                addMsg(d.candidates[0].content.parts[0].text, 'a');
            } catch (e) { addMsg("क्षमा करें, इंटरनेट समस्या है। कृपया रीफ्रेश करें।\nSorry, Internet issue. Please refresh.", 'a'); }
            btn.disabled = false;
        }

        function goHome() {
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('msg-area').innerHTML = "";
        }
        window.onload = type;
    </script>
</body>
</html>
